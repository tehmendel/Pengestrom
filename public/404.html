<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Pengestrøm</title>
    <script type="text/javascript">
      // GitHub Pages has no server-side routing, so a direct hit on any
      // subpage (or a refresh) 404s. This restores the intended path by
      // round-tripping it through a query string that index.html decodes.
      // See https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
